name: Cleanup Checker

on:
  schedule:
    - cron: "0 0 * * 0"   # runs every Sunday
  workflow_dispatch:       # manual run button

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run script
        run: node scripts/cleanup-check.js

      - name: Commit report
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add unused-files.json
          git commit -m "Update unused files" || echo "No changes"
          git push
